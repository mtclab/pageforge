name: ci

# Actions-budget discipline: no push-triggered runs. PRs get one gated run
# (superseded runs cancelled); production safety lives in deploy-production.yml,
# which typechecks + tests before every deploy.
on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - run: npm run build
