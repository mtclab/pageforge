name: ci

# Actions-budget discipline: NO automatic runs (no push, no pull_request).
# Gates run locally before push; production safety lives in
# deploy-production.yml, which typechecks + tests before every deploy.
# This workflow exists only for manual/dispatched verification.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - run: npm run build
