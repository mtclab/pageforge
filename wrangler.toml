name = "pageforge"
main = "src/worker/index.ts"
compatibility_date = "2026-07-01"
workers_dev = true
routes = [
  { pattern = "pageforge.mtclab.net", custom_domain = true },
]

[vars]
PUBLISH_ENABLED = "false"
MUTATION_API_ENABLED = "false"

[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = ["/api/*", "/s/*", "/p/*", "/b/*"]

[[kv_namespaces]]
binding = "SITES"
id = "b00a7b60e9db4f33848a53acb6499420"
